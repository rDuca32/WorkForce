    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta name="description" content="Aplicație destinată managerilor de șantiere">
    <script src="javascript/script.js" defer></script>
    <script src="javascript/jquery-4.0.0.min.js"></script>
</head>

<body>

    <header>
        <nav>
            <img class="logo" src="assets/logo.png" alt="logo">
            <ul class="menu">
                <li><a href="index.html">Acasă</a></li>

                <li>
                    <a href="auth.html">Autentificare <i class="fa-solid fa-chevron-down menu-icon"></i></a>
                    <ul class="submenu">
                        <li><a href="login.html">Conectare</a></li>
                        <li><a href="register.html">Înregistrare</a></li>
                    </ul>
                </li>

                <li><a href="tasks.html">Sarcini</a></li>

                <li>
                    <a href="monitoring.html">Monitorizare <i class="fa-solid fa-chevron-down menu-icon"></i></a>

                    </ul>
                </li>

            </ul>
        </nav>
    </header>

    <main>
        <form class="login_form" name="login_form" method="post" action="#" onsubmit="validateFormOnSubmit(event)">
            <h1>Conectare</h1>

            <label for="username">Nume de utilizator:</label>

            <div class="form-helper">
                <input id="username" type="text" name="username" placeholder="Nume de utilizator">
                <span class="status-dot"></span>
            </div>

            <label for="password">Parolă:</label>

            <div class="form-helper">
                <input id="password" type="password" name="password" placeholder="Parolă">
                <span class="status-dot"></span>
            </div>
            
            <br>

            <button type="submit">Conectare</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 WorkForce. Toate drepturile rezervate.</p>

        <div class="social-links">
            <a href="#" class="sprite-icon icon-fb" title="Facebook"></a>
            <a href="#" class="sprite-icon icon-ig" title="Instagram"></a>
            <a href="#" class="sprite-icon icon-yt" title="Youtube"></a>
        </div>
    </footer>

</body>
