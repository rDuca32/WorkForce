</head>

        <nav>
            <img class="logo" src="../assets/logo.png" alt="logo">
            <ul class="menu">
                <li><a href="index.html">Acasă</a></li>

                <li>
                    <a href="monitoring.html">Monitorizare <i class="fa-solid fa-chevron-down menu-icon"></i></a>

                    </ul>
                </li>

                <li><a href="users.html">Utilizatori</a></li>
            </ul>
        </nav>
    </header>

    <main id="registration">

        <form class="register_form" name="register_form" method="post" action="#" onsubmit="validateFormOnSubmit(event)">
            <h1>Înregistrare</h1>

            <label for="email">Email:</label>
            <div class="form-helper">
                <input id="email" type="email" name="email" placeholder="Email">
                <span class="status-dot"></span>
            </div>

            <label for="phone">Telefon:</label>

            <div class="form-helper">
                <input id="phone" type="tel" name="phone" placeholder="Telefon">
                <span class="status-dot"></span>
            </div>

            <label for="address">Adresă:</label>
            <input id="address" type="text" name="address" placeholder="Adresă">

            <label for="username">Nume de utilizator:</label>
            <input id="username" type="text" name="username" placeholder="Nume de utilizator">

            <label for="password_register">Parolă:</label>
            <div class="form-helper">
                <input id="password_register" type="password" name="password" placeholder="Parolă">
                <span class="status-dot"></span>
            </div>

            <label for="password_confirmation">Confirmare parolă:</label>
            <input id="password_confirmation" type="password" name="password_confirmation"
                placeholder="Confirmare parolă">

            <label for="date">Data nașterii:</label>
            <div class="form-helper">
                <input id="date" type="text" name="date" placeholder="Data nașterii">
                <span class="status-dot"></span>
            </div>

            <label for="age">Vârstă:</label>
            <input id="age" type="number" name="age" placeholder="Vârstă" min="18" max="70" step="1">

            <label for="photo">Poză de profil:</label>
            <input id="photo" type="file" name="photo">

            <label for="country">Țară:</label>
            <input id="country" type="text" name="country" value="România" readonly>

            <label for="city">Oraș:</label>
            <input id="city" list="cities" name="city">

            <datalist id="cities">
                <option value="Cluj-Napoca">
                <option value="București">
                <option value="Bistrița">
                <option value="Brașov">
            </datalist>

            <label>Genul:</label>
            <select name="gender">
                <option value="none">Niciunul</option>
                <option value="m">Masculin</option>
                <option value="f">Feminin</option>
            </select>
            <br>

            <label>
                <input id="confirm" type="checkbox" name="confirm">
                Confirmare
            </label>

            <br>

            <p>Doriți notificări?</p>

            <label>
                <input type="radio" name="notifications" value="yes"> DA
            </label>

            <label>
                <input type="radio" name="notifications" value="no"> NU
            </label>

            <label>Inregistrându-vă înseamnă că sunteți de acord cu termenii și condițiile.</label>

            <br>

            <button type="submit">Inregistrare</button>
        </form>

    </main>

    <footer>
        <p>&copy; 2026 WorkForce. Toate drepturile rezervate.</p>

        <div class="social-links">
            <a href="#" class="sprite-icon icon-fb" title="Facebook"></a>

        </div>
    </footer>

</body>
